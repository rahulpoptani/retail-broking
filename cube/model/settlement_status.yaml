cubes:
  - name: SettlementStatus
    sql_table: gold.settlement_status
    # Grain: one row per trade_id — T+1/T+2 settlement state per trade.
    # Used by compliance/backoffice dashboards and Conversational BI queries
    # like "how many trades are pending settlement past T+2?"

    dimensions:
      - name: trade_id
        sql: trade_id
        type: string
        primary_key: false

      - name: settlement_state
        sql: settlement_state
        type: string
        description: "One of: PENDING, SETTLED, FAILED, UNDER_REVIEW"

      - name: settlement_date
        sql: settlement_date
        type: time

    measures:
      - name: total_trades
        type: count
        description: Total number of trades in the selected filter

      - name: pending_trades
        type: count
        filters:
          - sql: "{CUBE}.settlement_state = 'PENDING'"
        description: Trades still awaiting settlement

      - name: settled_trades
        type: count
        filters:
          - sql: "{CUBE}.settlement_state = 'SETTLED'"
        description: Successfully settled trades

      - name: failed_trades
        type: count
        filters:
          - sql: "{CUBE}.settlement_state = 'FAILED'"
        description: Trades that failed settlement — require manual intervention

      - name: settlement_rate_pct
        # settled / total × 100
        sql: "CASE WHEN COUNT(*) = 0 THEN 0 ELSE 100.0 * SUM(CASE WHEN settlement_state = 'SETTLED' THEN 1 ELSE 0 END) / COUNT(*) END"
        type: number
        description: Percentage of trades successfully settled

    pre_aggregations:
      - name: by_state_day
        type: rollup
        dimensions:
          - settlement_state
        measures:
          - total_trades
          - pending_trades
          - settled_trades
          - failed_trades
        time_dimension: settlement_date
        granularity: day
        partition_granularity: month
        refresh_key:
          every: 30 minutes
